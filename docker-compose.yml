# =============================================================================
# Polymarket Intelligence Platform — Docker Compose
#
# Services:
#   python  — Data collector (Python 3.13 + APScheduler) port: internal only
#   laravel — Dashboard (Laravel 12 + FrankenPHP)        port: 8088
#
# External services (sudah jalan di Docker network sikap-app_sikap-network):
#   postgres_db  — PostgreSQL 15
#   redis_cache  — Redis 7
#
# Semua services join network sikap-app_sikap-network agar bisa reach
# postgres_db dan redis_cache via container name langsung.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Python 3.13 — Data Collector
  # Jalan terus 24/7, collect market data setiap 5 menit
  # ---------------------------------------------------------------------------
  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: polyintel_python
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./python:/app
      - ./python/logs:/app/logs
    networks:
      - sikap-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "scheduler.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Laravel 12 + FrankenPHP — Dashboard
  # Port 8088 → akses via http://ip-vps:8088
  # Volume mount: setiap perubahan di ./laravel langsung live tanpa rebuild
  # ---------------------------------------------------------------------------
  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: polyintel_laravel
    restart: unless-stopped
    env_file:
      - .env
      - laravel/.env
    environment:
      # FrankenPHP server config
      SERVER_NAME: ":80"
      # Laravel app config — override dari .env kalau perlu
      # APP_ENV:   ${APP_ENV:-production}
      # APP_DEBUG: ${APP_DEBUG:-false}
    ports:
      - "8088:80"
    volumes:
      - ./laravel:/app
      - laravel_storage:/app/storage
    networks:
      - sikap-network
    # FIX: Laravel tidak depends on Python
    # Keduanya independent — dashboard tetap jalan kalau collector mati
    deploy:
      resources:
        limits:
          memory: 768M            # FrankenPHP + PHP workers
          cpus: "1.0"             # max 1 core untuk web requests
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"             # max 250MB total log Laravel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  laravel_storage:
    driver: local

# =============================================================================
# Networks — join existing network dari sikap-app
# postgres_db dan redis_cache sudah ada di network ini
# =============================================================================
networks:
  sikap-network:
    external: true
    name: sikap-app_sikap-network
